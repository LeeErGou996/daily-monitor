name: 12-Hour Financial Data Updater

on:
  schedule:
    - cron: '10 */12 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取仓库代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas pytz

      - name: 🚀 运行抓取脚本
        run: python fetch_and_save.py

      - name: 💾 自动 Commit 并 Push 两个 JSON 文件
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data.json history.json
          git commit -m "🤖 Auto-update financial data & history [skip ci]" || echo "No changes to commit"
          git push
