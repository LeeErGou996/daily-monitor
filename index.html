<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>核心资产 12 小时快照面板</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 720px;
            width: 100%;
            padding: 24px 16px 40px;
        }
        .card {
            background: radial-gradient(circle at top left, #1f2937, #020617);
            border-radius: 18px;
            padding: 24px 20px 28px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.25);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 24px;
            letter-spacing: 0.03em;
        }
        .subtitle {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 18px;
        }
        #update-time {
            font-size: 12px;
            color: #e5e7eb;
            margin-bottom: 18px;
        }
        #data-container {
            margin-top: 8px;
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(55, 65, 81, 0.9);
            padding: 10px 12px;
        }
        .asset-row {
            display: flex;
            align-items: center;
            padding: 8px 4px;
            border-bottom: 1px dashed rgba(55, 65, 81, 0.9);
        }
        .asset-row:last-child {
            border-bottom: none;
        }
        .positive {
            color: #4ade80;
        }
        .negative {
            color: #f97373;
        }
        button {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 9px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        button:disabled {
            opacity: 0.7;
            cursor: default;
            box-shadow: none;
        }
        .footer {
            margin-top: 14px;
            font-size: 11px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>核心 ETF 资产监控</h1>
            <div class="subtitle">每天 2 次快照 · GitHub Actions 自动刷新 · 纯前端静态页面</div>

            <div id="update-time">📡 正在读取最新快照时间…</div>

            <button id="fetchBtn" onclick="fetchData()">
                🔄 获取最新展示
            </button>

            <div id="data-container"></div>

            <div class="footer">
                本页展示为延迟 12 小时内的静态快照，仅用于长期投资组合的价格概览，不构成任何投资建议。
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const btn = document.getElementById('fetchBtn');
            const container = document.getElementById('data-container');
            const timeDiv = document.getElementById('update-time');

            btn.disabled = true;
            btn.innerText = "⏳ 读取本地快照...";

            try {
                const response = await fetch('./data.json?t=' + new Date().getTime());

                if (!response.ok) {
                    throw new Error("尚未生成 data.json，请等待 GitHub 机器人运行完毕");
                }

                const result = await response.json();

                timeDiv.innerHTML = `📡 <b>最后快照 (慕尼黑时间):</b> ${result.timestamp}<br><span style="color:#64748b; font-size:10px;">(数据由 GitHub Actions 每 12 小时自动更新)</span>`;
                container.innerHTML = '';

                result.data.forEach(item => {
                    const colorClass = item.change_pct > 0 ? 'positive' : (item.change_pct < 0 ? 'negative' : '');
                    const arrow = item.change_pct > 0 ? '▲' : (item.change_pct < 0 ? '▼' : '-');
                    const sign = item.change_amt > 0 ? '+' : '';

                    const rowHtml = `
                        <div class="asset-row">
                            <div style="width: 40%;"><strong>${item.name}</strong></div>
                            <div style="width: 25%; text-align: right;">${item.price.toFixed(2)} €</div>
                            <div style="width: 35%; text-align: right;" class="${colorClass}">
                                ${arrow} ${item.change_pct.toFixed(2)}% (${sign}${item.change_amt.toFixed(2)}€)
                            </div>
                        </div>
                    `;
                    container.innerHTML += rowHtml;
                });

            } catch (error) {
                container.innerHTML = `<p class="negative">⚠️ 错误: ${error.message}</p>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "🔄 获取最新展示";
            }
        }

        window.onload = fetchData;
    </script>
</body>
</html>
