<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>财富帝国监控中枢</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            padding-bottom: 40px;
        }
        .dashboard {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 16px;
            padding: 30px;
            width: 700px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        button:hover { background: #2563eb; }
        button:disabled { background: #64748b; cursor: wait; }

        .asset-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #334155;
            font-size: 17px;
        }
        .positive { color: #22c55e; }
        .negative { color: #ef4444; }
        #update-time { font-size: 12px; color: #94a3b8; margin-bottom: 20px;}

        .chart-container {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #334155;
            position: relative;
            height: 350px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h2>🌍 全球核心资产雷达</h2>
        <button id="fetchBtn" onclick="fetchData()">🔄 获取最新展示</button>
    </div>
    <div id="update-time">等待初始化...</div>

    <div id="data-container"></div>

    <div class="chart-container">
        <div style="text-align:center; font-size:12px; color:#94a3b8; margin-bottom:10px;">
            📈 <b>帝国崛起之路：自 2026年1月1日 以来的绝对净值走势</b><br>
            👆 点击图例基金名称可 隐藏/显示 对应折线
        </div>
        <canvas id="trendChart"></canvas>
    </div>
</div>

<script>
    let myChart = null;

    async function fetchData() {
        const btn = document.getElementById('fetchBtn');
        const container = document.getElementById('data-container');
        const timeDiv = document.getElementById('update-time');

        btn.disabled = true;
        btn.innerText = "⏳ 加载看板与图表...";

        try {
            const resData = await fetch('./data.json?t=' + new Date().getTime());
            const result = await resData.json();

            timeDiv.innerHTML = `📡 <b>最后快照 (慕尼黑时间):</b> ${result.timestamp}`;
            container.innerHTML = '';

            result.data.forEach(item => {
                const colorClass = item.change_pct > 0 ? 'positive' : (item.change_pct < 0 ? 'negative' : '');
                const arrow = item.change_pct > 0 ? '▲' : (item.change_pct < 0 ? '▼' : '-');
                const sign = item.change_amt > 0 ? '+' : '';

                container.innerHTML += `
                    <div class="asset-row">
                        <div style="width: 40%;"><strong>${item.name}</strong></div>
                        <div style="width: 25%; text-align: right;">${item.price.toFixed(2)} €</div>
                        <div style="width: 35%; text-align: right;" class="${colorClass}">
                            ${arrow} ${item.change_pct.toFixed(2)}% (${sign}${item.change_amt.toFixed(2)}€)
                        </div>
                    </div>
                `;
            });

            const resHist = await fetch('./history.json?t=' + new Date().getTime());
            const histData = await resHist.json();
            renderChart(histData);

        } catch (error) {
            container.innerHTML = `<p class="negative">⚠️ 错误: 尚未生成数据，请去 GitHub Actions 触发一次运行。</p>`;
        } finally {
            btn.disabled = false;
            btn.innerText = "🔄 获取最新展示";
        }
    }

    function renderChart(histData) {
        const ctx = document.getElementById('trendChart').getContext('2d');

        if (myChart) {
            myChart.destroy();
        }

        const labels = histData.map(d => d.date.substring(5));
        const vuaaData = histData.map(d => d['VUAA.DE']);
        const xnasData = histData.map(d => d['XNAS.DE']);
        const vgweData = histData.map(d => d['VGWE.DE']);

        Chart.defaults.color = '#94a3b8';

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '标普500 (VUAA)',
                        data: vuaaData,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        tension: 0.3,
                        pointRadius: 2
                    },
                    {
                        label: '纳指100 (XNAS)',
                        data: xnasData,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        borderWidth: 2,
                        tension: 0.3,
                        pointRadius: 2
                    },
                    {
                        label: '全球高息 (VGWE)',
                        data: vgweData,
                        borderColor: '#f59e0b',
                        backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        borderWidth: 2,
                        tension: 0.3,
                        pointRadius: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { color: '#e2e8f0', usePointStyle: true }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(15, 23, 42, 0.9)',
                        titleColor: '#fff',
                        bodyColor: '#cbd5e1',
                        borderColor: '#334155',
                        borderWidth: 1
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255, 255, 255, 0.05)' }
                    },
                    y: {
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        beginAtZero: false
                    }
                }
            }
        });
    }

    window.onload = fetchData;
</script>

</body>
</html>
