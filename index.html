<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>My financial dashboard| Project 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ================== 全局与色彩 ================== */
        :root {
            --bg-color: #0b1120;
            --panel-bg: rgba(15, 23, 42, 0.6);
            --border-glow: rgba(56, 189, 248, 0.2);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent-blue: #38bdf8;
            --up-green: #10b981;
            --down-red: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.05), transparent 25%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
        }

        /* ================== 核心控制面板 ================== */
        .dashboard {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 35px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 0 1px var(--border-glow);
            transition: all 0.3s ease;
        }

        .dashboard:hover {
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.1), inset 0 0 0 1px rgba(56, 189, 248, 0.4);
        }

        /* ================== 头部区域 ================== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }

        h2::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 24px;
            background: var(--accent-blue);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--accent-blue);
        }

        /* ================== 科技感按钮 ================== */
        button {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        button:hover { 
            background: var(--accent-blue);
            color: #fff;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        button:disabled { 
            background: transparent;
            border-color: #475569;
            color: #475569;
            cursor: not-allowed;
            box-shadow: none;
        }

        #update-time { 
            font-size: 13px; 
            color: var(--text-sub); 
            margin-bottom: 25px;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ================== 数据列表区 ================== */
        #data-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .asset-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.2s, background 0.2s;
            font-family: monospace;
            font-size: 16px;
        }

        .asset-row:hover {
            transform: translateY(-2px);
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .asset-name { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 17px; }
        .positive { color: var(--up-green); text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
        .negative { color: var(--down-red); text-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }

        /* ================== 图表区 ================== */
        .chart-container {
            margin-top: 40px;
        }
        
        .section-title {
            text-align: center;
            font-size: 13px;
            color: var(--text-sub);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .chart-box {
            position: relative;
            height: 240px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .chart-title {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 12px;
            color: var(--text-sub);
            font-weight: 600;
            z-index: 10;
            background: rgba(15, 23, 42, 0.8);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 加载动画 */
        .pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h2>My financial dashboard</h2>
        <button id="fetchBtn" onclick="fetchData()">
            <span style="display: flex; align-items: center; gap: 8px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.13 15.57a10 10 0 1 0 3.43-11.41L2 8"/></svg>
                SYNC DATA
            </span>
        </button>
    </div>
    
    <div id="update-time">
        <span style="display:inline-block; width:8px; height:8px; background:var(--text-sub); border-radius:50%;" id="status-dot"></span>
        SYSTEM STANDBY...
    </div>

    <div id="data-container">
        <div class="asset-row pulse" style="height: 24px;"></div>
        <div class="asset-row pulse" style="height: 24px;"></div>
        <div class="asset-row pulse" style="height: 24px;"></div>
    </div>

    <div class="chart-container">
        <div class="section-title">INCEPTION HORIZON (SINCE JAN 2026)</div>
        <div class="chart-grid">
            <div class="chart-box">
                <div class="chart-title">S&P 500 (VUAA.DE)</div>
                <canvas id="chart-vuaa"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">NASDAQ 100 (XNAS.DE)</div>
                <canvas id="chart-xnas"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">HIGH DIVIDEND (VGWE.DE)</div>
                <canvas id="chart-vgwe"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    let chartVUAA = null;
    let chartXNAS = null;
    let chartVGWE = null;

    // 配置全局 Chart.js 默认样式
    Chart.defaults.color = '#64748b';
    Chart.defaults.font.family = 'monospace';
    const commonChartOptions = {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
            legend: { display: false },
            tooltip: {
                backgroundColor: 'rgba(15, 23, 42, 0.95)',
                titleColor: '#fff',
                bodyColor: '#38bdf8',
                bodyFont: { size: 14, weight: 'bold' },
                borderColor: '#334155',
                borderWidth: 1,
                padding: 10,
                displayColors: false,
                callbacks: {
                    label: function(context) { return context.parsed.y.toFixed(2) + ' €'; }
                }
            }
        },
        scales: {
            x: { 
                grid: { display: false }, 
                ticks: { maxTicksLimit: 8, maxRotation: 0 } 
            },
            y: {
                grid: { color: 'rgba(255, 255, 255, 0.03)', drawBorder: false },
                beginAtZero: false,
                position: 'right' // Y轴放在右侧更专业
            }
        },
        elements: {
            line: { tension: 0.4 }, // 更平滑的曲线
            point: { radius: 0, hitRadius: 10, hoverRadius: 4 } // 隐藏普通点，悬停时发光
        }
    };

    async function fetchData() {
        const btn = document.getElementById('fetchBtn');
        const container = document.getElementById('data-container');
        const timeDiv = document.getElementById('update-time');
        const statusDot = document.getElementById('status-dot');

        btn.disabled = true;
        btn.innerHTML = 'SYNCING...';
        statusDot.style.background = '#eab308'; // 黄色加载中
        statusDot.classList.add('pulse');

        try {
            // 1. 加载快照
            const resData = await fetch('./data.json?t=' + new Date().getTime());
            const result = await resData.json();

            statusDot.style.background = '#10b981'; // 绿色成功
            statusDot.classList.remove('pulse');
            timeDiv.innerHTML = `<span style="display:inline-block; width:8px; height:8px; background:var(--up-green); box-shadow:0 0 8px var(--up-green); border-radius:50%;"></span> LAST LINK: ${result.timestamp} (CET)`;
            
            container.innerHTML = '';

            result.data.forEach(item => {
                const colorClass = item.change_pct > 0 ? 'positive' : (item.change_pct < 0 ? 'negative' : '');
                const arrow = item.change_pct > 0 ? '▲' : (item.change_pct < 0 ? '▼' : '■');
                const sign = item.change_amt > 0 ? '+' : '';

                container.innerHTML += `
                    <div class="asset-row">
                        <div class="asset-name" style="width: 40%;">${item.name}</div>
                        <div style="width: 25%; text-align: right; font-weight: bold;">${item.price.toFixed(2)} €</div>
                        <div style="width: 35%; text-align: right;" class="${colorClass}">
                            ${arrow} ${item.change_pct.toFixed(2)}% <span style="font-size: 13px; opacity: 0.8;">(${sign}${item.change_amt.toFixed(2)})</span>
                        </div>
                    </div>
                `;
            });

            // 2. 加载历史
            const resHist = await fetch('./history.json?t=' + new Date().getTime());
            const histData = await resHist.json();
            renderCharts(histData);

        } catch (error) {
            statusDot.style.background = '#ef4444'; // 红色失败
            timeDiv.innerHTML = `<span style="display:inline-block; width:8px; height:8px; background:var(--down-red); box-shadow:0 0 8px var(--down-red); border-radius:50%;"></span> OFFLINE: WAITING FOR CRON JOB`;
            container.innerHTML = `<div class="asset-row negative" style="justify-content:center;">CONNECTION FAILED. LOCAL DATA NOT FOUND.</div>`;
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<span style="display: flex; align-items: center; gap: 8px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.13 15.57a10 10 0 1 0 3.43-11.41L2 8"/></svg> RE-SYNC</span>`;
        }
    }

    function createGradient(ctx, colorStart, colorEnd) {
        const gradient = ctx.createLinearGradient(0, 0, 0, 240);
        gradient.addColorStop(0, colorStart);
        gradient.addColorStop(1, colorEnd);
        return gradient;
    }

    function renderCharts(histData) {
        const labels = histData.map(d => d.date);
        const vuaaData = histData.map(d => d['VUAA.DE']);
        const xnasData = histData.map(d => d['XNAS.DE']);
        const vgweData = histData.map(d => d['VGWE.DE']);

        if (chartVUAA) chartVUAA.destroy();
        if (chartXNAS) chartXNAS.destroy();
        if (chartVGWE) chartVGWE.destroy();

        const ctxVuaa = document.getElementById('chart-vuaa').getContext('2d');
        const ctxXnas = document.getElementById('chart-xnas').getContext('2d');
        const ctxVgwe = document.getElementById('chart-vgwe').getContext('2d');

        chartVUAA = new Chart(ctxVuaa, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    data: vuaaData,
                    borderColor: '#3b82f6',
                    backgroundColor: createGradient(ctxVuaa, 'rgba(59, 130, 246, 0.2)', 'rgba(59, 130, 246, 0)'),
                    borderWidth: 2,
                    fill: true
                }]
            },
            options: commonChartOptions
        });

        chartXNAS = new Chart(ctxXnas, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    data: xnasData,
                    borderColor: '#10b981',
                    backgroundColor: createGradient(ctxXnas, 'rgba(16, 185, 129, 0.2)', 'rgba(16, 185, 129, 0)'),
                    borderWidth: 2,
                    fill: true
                }]
            },
            options: commonChartOptions
        });

        chartVGWE = new Chart(ctxVgwe, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    data: vgweData,
                    borderColor: '#f59e0b',
                    backgroundColor: createGradient(ctxVgwe, 'rgba(245, 158, 11, 0.2)', 'rgba(245, 158, 11, 0)'),
                    borderWidth: 2,
                    fill: true
                }]
            },
            options: commonChartOptions
        });
    }

    window.onload = fetchData;
</script>

</body>
</html>
